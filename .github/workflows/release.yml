name: Release

# semantic-release: on push to main, analyze Conventional Commits since the last
# tag and, when there's a releasable change, publish to npm via OIDC trusted
# publishing (no NPM_TOKEN), push the `v<version>` git tag, and create a GitHub
# Release with the generated notes. It does NOT commit a changelog/version back
# to main (main requires signed commits) — the changelog lives in the GitHub
# Release. The trusted publisher on npmjs.com is pinned to THIS workflow file
# (release.yml) + the "release" environment, so keep both stable.
on:
  push:
    branches:
      - main

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # push the git tag + create the GitHub Release
      issues: write # semantic-release release comments
      pull-requests: write # semantic-release release comments
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run typecheck

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
